<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI PPT 생성기</title>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3d;
    --accent: #6c63ff;
    --accent2: #a78bfa;
    --text: #e8e8f0;
    --text-muted: #6b6b8a;
    --success: #10b981;
    --error: #ef4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── 로그인 화면 ── */
  #loginScreen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }

  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .login-logo {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    margin: 0 auto;
  }

  .login-title {
    text-align: center;
    font-size: 22px;
    font-weight: 700;
  }

  .login-sub {
    text-align: center;
    font-size: 13px;
    color: var(--text-muted);
    margin-top: -16px;
  }

  .login-field {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .login-field label {
    font-size: 13px;
    color: var(--text-muted);
  }

  .login-field input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .login-field input:focus { border-color: var(--accent); }

  .login-error {
    font-size: 13px;
    color: #fca5a5;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 8px;
    padding: 10px 14px;
    display: none;
  }

  .login-error.show { display: block; }

  .btn-login {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 12px;
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .btn-login:hover { opacity: 0.9; }

  /* ── 메인 앱 ── */
  #appScreen { display: none; flex-direction: column; min-height: 100vh; }

  header {
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
  }

  .logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  header h1 { font-size: 18px; font-weight: 600; }

  .btn-logout {
    margin-left: auto;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    font-size: 12px;
    padding: 6px 12px;
    cursor: pointer;
    font-family: inherit;
    transition: color 0.2s;
  }
  .btn-logout:hover { color: var(--text); }

  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
    padding: 40px;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .panel-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface2);
    position: relative;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(108,99,255,0.05);
  }

  .drop-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer;
  }

  .drop-icon { font-size: 36px; margin-bottom: 12px; }
  .drop-text { font-size: 14px; color: var(--text-muted); line-height: 1.6; }
  .drop-text strong { color: var(--accent); }

  .file-tags { display: flex; flex-wrap: wrap; gap: 6px; }

  .file-tag {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 12px;
    display: flex; align-items: center; gap: 6px;
  }

  .file-tag .remove {
    cursor: pointer; background: none; border: none;
    color: var(--error); font-size: 14px;
  }

  .divider {
    display: flex; align-items: center; gap: 12px;
    color: var(--text-muted); font-size: 12px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    resize: vertical;
    min-height: 120px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.6;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--text-muted); }

  .btn-generate {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 12px;
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }

  .btn-generate:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .status-area { display: none; flex-direction: column; gap: 8px; }
  .status-area.visible { display: flex; }

  .progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .status-text { font-size: 13px; color: var(--text-muted); }

  .preview-area { flex: 1; display: flex; flex-direction: column; gap: 16px; }

  .slide-preview {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .slide-preview-header {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-muted);
  }

  .slide-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 400px;
    overflow-y: auto;
    padding: 12px;
  }

  .slide-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
  }

  .slide-item .slide-num { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
  .slide-item .slide-type {
    display: inline-block; font-size: 10px; padding: 2px 6px;
    border-radius: 4px; margin-top: 4px;
    background: rgba(108,99,255,0.15); color: var(--accent2);
  }

  .btn-download {
    width: 100%;
    padding: 14px;
    background: var(--success);
    border: none;
    border-radius: 12px;
    color: white;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }

  .btn-download:hover { opacity: 0.9; }

  .model-badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--text-muted);
    background: var(--surface2); padding: 4px 8px;
    border-radius: 6px; border: 1px solid var(--border);
  }

  .model-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); }

  .alert { padding: 12px 16px; border-radius: 10px; font-size: 13px; display: none; }
  .alert.error {
    background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
    color: #fca5a5; display: block;
  }

  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; color: var(--text-muted);
    padding: 60px 20px; text-align: center;
  }

  .empty-icon { font-size: 48px; opacity: 0.4; }
  .empty-text { font-size: 14px; line-height: 1.6; }

  @media (max-width: 768px) {
    main { grid-template-columns: 1fr; padding: 20px; }
    header { padding: 16px 20px; }
    .login-box { margin: 20px; padding: 36px 24px; }
  }
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">✦</div>
    <div>
      <div class="login-title">AI PPT 생성기</div>
      <div class="login-sub">팀 전용 워크스페이스</div>
    </div>
    <div class="login-field">
      <label>아이디</label>
      <input type="text" id="loginId" placeholder="아이디 입력" autocomplete="username">
    </div>
    <div class="login-field">
      <label>비밀번호</label>
      <input type="password" id="loginPw" placeholder="비밀번호 입력" autocomplete="current-password" onkeydown="if(event.key==='Enter') doLogin()">
    </div>
    <div class="login-error" id="loginError">아이디 또는 비밀번호가 올바르지 않습니다.</div>
    <button class="btn-login" onclick="doLogin()">로그인</button>
  </div>
</div>

<!-- 메인 앱 -->
<div id="appScreen">
  <header>
    <div class="logo">✦</div>
    <h1>AI PPT 생성기</h1>
    <button class="btn-logout" onclick="doLogout()">로그아웃</button>
  </header>

  <main>
    <div class="panel">
      <div class="panel-title">📎 파일 업로드 또는 텍스트 입력</div>

      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" multiple accept=".txt,.html,.htm,.doc,.docx,.hwp,.hwpx,.pdf,.jpg,.jpeg,.png,.gif,.webp">
        <div class="drop-icon">☁️</div>
        <div class="drop-text">
          여기에 파일을 끌어다 놓거나 <strong>클릭해서 선택</strong><br>
          <small>TXT · HTML · Word · HWP · PDF · 이미지 지원</small>
        </div>
      </div>

      <div class="file-tags" id="fileTags"></div>

      <div class="divider">또는 직접 입력</div>

      <textarea id="textInput" placeholder="PPT로 만들 내용을 여기에 붙여넣으세요.

보고서 내용, 기획서, 회의록, 아이디어 메모 등 어떤 텍스트든 괜찮습니다."></textarea>

      <div class="alert" id="alertBox"></div>

      <div class="status-area" id="statusArea">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="status-text" id="statusText">분석 중...</div>
      </div>

      <button class="btn-generate" id="generateBtn" onclick="generate()">
        <span>✦</span> PPT 생성하기
      </button>
    </div>

    <div class="panel">
      <div class="panel-title">📊 미리보기</div>

      <div id="emptyState" class="empty-state">
        <div class="empty-icon">🖼️</div>
        <div class="empty-text">파일을 업로드하거나 텍스트를 입력한 뒤<br>PPT 생성하기 버튼을 눌러주세요</div>
      </div>

      <div id="previewArea" class="preview-area" style="display:none">
        <div style="display:flex; align-items:center; justify-content:space-between">
          <div class="model-badge">
            <div class="model-dot"></div>
            <span id="modelUsed">-</span>
          </div>
          <span id="slideCount" style="font-size:12px; color:var(--text-muted)"></span>
        </div>

        <div class="slide-preview">
          <div class="slide-preview-header">📋 슬라이드 목록</div>
          <div class="slide-list" id="slideList"></div>
        </div>

        <button class="btn-download" id="downloadBtn">
          ⬇️ PPT 다운로드 (.pptx)
        </button>
      </div>
    </div>
  </main>
</div>

<script>
const TEAM_ID = 'oanic';
const TEAM_PW = 'oanic2024!';

function doLogin() {
  const id = document.getElementById('loginId').value.trim();
  const pw = document.getElementById('loginPw').value;
  if (id === TEAM_ID && pw === TEAM_PW) {
    sessionStorage.setItem('ppt_auth', '1');
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'flex';
    document.getElementById('loginError').classList.remove('show');
  } else {
    document.getElementById('loginError').classList.add('show');
  }
}

function doLogout() {
  sessionStorage.removeItem('ppt_auth');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('appScreen').style.display = 'none';
}

if (sessionStorage.getItem('ppt_auth') === '1') {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'flex';
}

let uploadedFiles = [];

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const fileTags = document.getElementById('fileTags');

dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.classList.remove('drag-over'); handleFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

function handleFiles(files) {
  Array.from(files).forEach(file => {
    if (!uploadedFiles.find(f => f.name === file.name)) uploadedFiles.push(file);
  });
  renderFileTags();
}

function renderFileTags() {
  fileTags.innerHTML = uploadedFiles.map((f, i) => `
    <div class="file-tag">
      ${getFileEmoji(f.name)} ${f.name}
      <button class="remove" onclick="removeFile(${i})">×</button>
    </div>
  `).join('');
}

function getFileEmoji(name) {
  const ext = name.toLowerCase().split('.').pop();
  const map = { jpg:'🖼️', jpeg:'🖼️', png:'🖼️', gif:'🖼️', webp:'🖼️', pdf:'📄', doc:'📝', docx:'📝', hwp:'📝', hwpx:'📝', html:'🌐', htm:'🌐', txt:'📃' };
  return map[ext] || '📎';
}

function removeFile(i) { uploadedFiles.splice(i, 1); renderFileTags(); }

function showAlert(msg) {
  const box = document.getElementById('alertBox');
  box.className = 'alert error';
  box.textContent = msg;
}

function hideAlert() { document.getElementById('alertBox').className = 'alert'; }

function setProgress(pct, text) {
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('statusText').textContent = text;
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function fileToText(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.onerror = reject;
    reader.readAsText(file, 'UTF-8');
  });
}

async function generate() {
  hideAlert();
  const textInput = document.getElementById('textInput').value.trim();
  if (uploadedFiles.length === 0 && !textInput) { showAlert('파일을 업로드하거나 텍스트를 입력해주세요.'); return; }

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  document.getElementById('statusArea').classList.add('visible');
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('previewArea').style.display = 'none';

  try {
    let payload = {};
    if (uploadedFiles.length > 0) {
      const file = uploadedFiles[0];
      const ext = file.name.toLowerCase().split('.').pop();
      const isImage = ['jpg','jpeg','png','gif','webp'].includes(ext);
      setProgress(20, '파일 읽는 중...');
      if (isImage) {
        const base64 = await fileToBase64(file);
        payload = { filename: file.name, mimeType: file.type, content: base64, isBase64: true };
      } else {
        const text = await fileToText(file);
        payload = { filename: file.name, mimeType: file.type, textContent: text };
      }
    } else {
      payload = { filename: 'input.txt', textContent: textInput };
    }

    setProgress(40, 'AI가 내용을 분석하는 중...');
    const response = await fetch('/.netlify/functions/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    const result = await response.json();
    if (!response.ok || result.error) throw new Error(result.error || '서버 오류가 발생했습니다.');

    setProgress(70, 'PPT 파일 생성 중...');
    await buildPptx(result.data);

    setProgress(100, '완료!');
    document.getElementById('modelUsed').textContent = result.modelUsed || 'AI';
    document.getElementById('slideCount').textContent = `총 ${result.data.slides.length}장`;
    renderSlideList(result.data.slides);
    document.getElementById('previewArea').style.display = 'flex';
  } catch (err) {
    showAlert('오류: ' + err.message);
    setProgress(0, '');
    document.getElementById('statusArea').classList.remove('visible');
    document.getElementById('emptyState').style.display = 'flex';
  } finally {
    btn.disabled = false;
  }
}

function renderSlideList(slides) {
  document.getElementById('slideList').innerHTML = slides.map((s, i) => `
    <div class="slide-item">
      <div class="slide-num">슬라이드 ${i + 1}</div>
      <div class="slide-title">${s.title || '(제목 없음)'}</div>
      <span class="slide-type">${s.type}</span>
    </div>
  `).join('');
}

async function buildPptx(data) {
  const pptx = new PptxGenJS();
  pptx.layout = 'LAYOUT_16x9';
  const theme = data.theme || { primary: '#1E2761', secondary: '#CADCFC', accent: '#6C63FF', background: '#FFFFFF', text: '#1a1a2e' };

  for (let i = 0; i < data.slides.length; i++) {
    const s = data.slides[i];
    const slide = pptx.addSlide();
    const isDark = i === 0 || s.type === 'closing';
    slide.background = { color: isDark ? theme.primary.replace('#','') : theme.background.replace('#','') };
    const textColor = isDark ? 'FFFFFF' : theme.text.replace('#','');

    if (s.type === 'title') {
      slide.addShape(pptx.ShapeType.rect, { x: 0, y: 3.5, w: '100%', h: 0.5, fill: { color: theme.accent.replace('#',''), transparency: 70 } });
      slide.addText(s.title || data.title, { x: 0.8, y: 1.2, w: 8.4, h: 1.4, fontSize: 40, bold: true, color: textColor, fontFace: 'Malgun Gothic', align: 'left', breakLine: true });
      if (s.subtitle) slide.addText(s.subtitle, { x: 0.8, y: 2.8, w: 8.4, h: 0.8, fontSize: 18, color: isDark ? 'CADCFC' : theme.accent.replace('#',''), fontFace: 'Malgun Gothic', align: 'left' });
      slide.addShape(pptx.ShapeType.rect, { x: 0.8, y: 4.2, w: 1.5, h: 0.08, fill: { color: theme.accent.replace('#','') } });
    } else if (s.type === 'closing') {
      slide.addText(s.title || '감사합니다', { x: 0.8, y: 1.8, w: 8.4, h: 1.2, fontSize: 44, bold: true, color: 'FFFFFF', fontFace: 'Malgun Gothic', align: 'center' });
      if (s.content?.[0]) slide.addText(typeof s.content[0] === 'string' ? s.content[0] : (s.content[0].text || ''), { x: 0.8, y: 3.2, w: 8.4, h: 0.8, fontSize: 16, color: 'CADCFC', fontFace: 'Malgun Gothic', align: 'center' });
    } else {
      slide.addShape(pptx.ShapeType.rect, { x: 0, y: 0, w: '100%', h: 0.9, fill: { color: theme.primary.replace('#','') } });
      slide.addText(s.title || '', { x: 0.4, y: 0.1, w: 9.2, h: 0.7, fontSize: 20, bold: true, color: 'FFFFFF', fontFace: 'Malgun Gothic' });
      slide.addText(`${i + 1} / ${data.slides.length}`, { x: 8.8, y: 0.15, w: 0.8, h: 0.5, fontSize: 10, color: 'FFFFFF', align: 'right', transparency: 50 });
      const content = (s.content || []).map(c => typeof c === 'string' ? c : (c.text || JSON.stringify(c)));

      if (s.layout === 'stats' && content.length > 0) {
        const cols = Math.min(content.length, 3);
        const w = 9.6 / cols;
        content.slice(0, cols).forEach((item, idx) => {
          slide.addShape(pptx.ShapeType.rect, { x: 0.2 + idx * w, y: 1.1, w: w - 0.2, h: 2.8, fill: { color: theme.secondary.replace('#',''), transparency: 60 }, line: { color: theme.accent.replace('#',''), width: 1 } });
          slide.addText(item, { x: 0.2 + idx * w, y: 1.4, w: w - 0.2, h: 2.2, fontSize: 14, color: textColor, fontFace: 'Malgun Gothic', align: 'center', valign: 'middle', wrap: true });
        });
      } else if (s.layout === 'two-column' && content.length > 1) {
        const half = Math.ceil(content.length / 2);
        const left = content.slice(0, half).map(c => ({ text: '• ' + c, options: { breakLine: true } }));
        const right = content.slice(half).map(c => ({ text: '• ' + c, options: { breakLine: true } }));
        slide.addText(left, { x: 0.4, y: 1.1, w: 4.6, h: 3.6, fontSize: 14, color: textColor, fontFace: 'Malgun Gothic', valign: 'top' });
        slide.addText(right, { x: 5.3, y: 1.1, w: 4.5, h: 3.6, fontSize: 14, color: textColor, fontFace: 'Malgun Gothic', valign: 'top' });
      } else if (s.layout === 'quote' && content.length > 0) {
        slide.addShape(pptx.ShapeType.rect, { x: 0.4, y: 1.2, w: 0.15, h: 2.8, fill: { color: theme.accent.replace('#','') } });
        slide.addText('"' + content[0] + '"', { x: 0.8, y: 1.4, w: 8.8, h: 2.6, fontSize: 22, italic: true, color: textColor, fontFace: 'Malgun Gothic', valign: 'middle', wrap: true });
      } else {
        const textRows = content.map(c => ({ text: '• ' + c, options: { breakLine: true } }));
        slide.addText(textRows, { x: 0.6, y: 1.1, w: 9.0, h: 3.6, fontSize: 15, color: textColor, fontFace: 'Malgun Gothic', valign: 'top', lineSpacingMultiple: 1.6 });
      }
      if (s.notes) slide.addNotes(s.notes);
    }
  }

  document.getElementById('downloadBtn').onclick = async () => {
    await pptx.writeFile({ fileName: (data.title || 'presentation') + '.pptx' });
  };
}
</script>
